<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SuikaGame</title>
    <style>
        html,body,#canvas{margin:0;padding:0;border:0;width:100%;height:100%}
        body{color:#fff;background-color:#000;overflow:hidden}
    </style>
    <link id="-gd-engine-icon" rel="icon" type="image/png" href="index.icon.png">
    <link rel="apple-touch-icon" href="index.apple-touch-icon.png">
    
    <script src="/sdk.js"></script>
    <script>
        var ysdk, godot_handler = null;
        YaGames.init().then(e => {
            ysdk = e;
            console.log("Yandex SDK initialized");
        });
        function registerGodotHandler(e) { godot_handler = e; }
        function showAd() {
            if (!ysdk) {
                if (godot_handler) godot_handler.call("on_ad_finished");
                return;
            }
            ysdk.adv.showFullscreenAdv({
                callbacks: {
                    onOpen: () => { if (godot_handler) godot_handler.call("on_ad_started"); },
                    onClose: () => { window.focus(); if (godot_handler) godot_handler.call("on_ad_finished"); },
                    onError: () => { if (godot_handler) godot_handler.call("on_ad_finished"); }
                }
            });
        }
    </script>
    <script type="text/javascript" src="pako_inflate.min.js"></script>
</head>
<body>
    <canvas id="canvas">Ваш браузер не поддерживает Canvas.</canvas>
    <script>console.log("Game Loading...")</script>
    $GODOT_JS_WRAPPER
</body>
</html>
